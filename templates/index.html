<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stay up-to-date with the latest Google Cloud BigQuery releases and features. Select updates to share them instantly on X (formerly Twitter).">
    <title>BigQuery Release Notes Dashboard & X Share</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Keyframe animation for feed cards fade in */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="header">
            <div class="brand-section">
                <h1 class="brand-title">
                    <!-- BigQuery Custom Icon / Database + Sparkles -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
                        <path d="M3 12A9 3 0 0 0 21 12"></path>
                        <path d="M19 21l-4-4 4-4"></path>
                    </svg>
                    BigQuery Release Notes
                </h1>
                <p class="brand-subtitle">Stream and share the latest updates from Google BigQuery</p>
            </div>
            
            <div class="action-buttons">
                <button id="refresh-btn" class="btn btn-secondary" aria-label="Refresh release notes feed">
                    <svg class="spinner" viewBox="0 0 50 50">
                        <circle cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                    </svg>
                    <svg class="btn-icon-refresh" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    <span class="btn-text">Refresh Feed</span>
                </button>
            </div>
        </header>

        <!-- Main Dashboard Content -->
        <main class="dashboard-grid">
            <!-- Sidebar: Search and Category Filtering -->
            <aside class="sidebar">
                <section class="sidebar-section">
                    <h2 class="sidebar-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                        </svg>
                        Filter Updates
                    </h2>
                    
                    <!-- Search Input -->
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" class="search-input" placeholder="Search updates..." aria-label="Search release notes by keyword">
                    </div>

                    <!-- Category Chips -->
                    <nav class="filter-list" aria-label="Categories filter">
                        <button class="filter-chip active" data-filter="all">
                            <span>All Categories</span>
                            <span class="chip-count">—</span>
                        </button>
                        <button class="filter-chip" data-filter="feature">
                            <span>Features</span>
                            <span class="chip-count">0</span>
                        </button>
                        <button class="filter-chip" data-filter="issue">
                            <span>Issues</span>
                            <span class="chip-count">0</span>
                        </button>
                        <button class="filter-chip" data-filter="changed">
                            <span>Changed</span>
                            <span class="chip-count">0</span>
                        </button>
                        <button class="filter-chip" data-filter="deprecated">
                            <span>Deprecated</span>
                            <span class="chip-count">0</span>
                        </button>
                        <button class="filter-chip" data-filter="general">
                            <span>General</span>
                            <span class="chip-count">0</span>
                        </button>
                    </nav>
                </section>
            </aside>

            <!-- Feed Section -->
            <section class="main-feed" aria-labelledby="results-count">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;">
                    <h3 id="results-count" style="font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Loading...</h3>
                </div>

                <!-- Feed Cards Timeline Container -->
                <div id="feed-container" class="feed-content">
                    <!-- Cards will be populated by JavaScript -->
                </div>
            </section>
        </main>
    </div>

    <!-- Share to X Modal -->
    <div id="tweet-modal" class="modal-overlay" aria-hidden="true" role="dialog">
        <div class="modal-card">
            <header class="modal-header">
                <h2 class="modal-title">
                    <!-- X Logo Custom SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" style="fill: white;">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Draft Tweet
                </h2>
                <button id="modal-close" class="modal-close" aria-label="Close modal">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </header>
            
            <div class="modal-body">
                <div class="tweet-textarea-wrapper">
                    <textarea id="tweet-textarea" class="tweet-textarea" placeholder="What's happening?" aria-label="Tweet editor"></textarea>
                    <div class="tweet-counter-row">
                        <span class="draft-label">Draft Preview</span>
                        <div class="char-counter" id="char-counter">280</div>
                    </div>
                </div>
                <div class="tweet-preview-notice">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>Clicking Tweet will open the X composer in a new tab.</span>
                </div>
            </div>
            
            <footer class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                <button id="tweet-confirm-btn" class="btn btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Tweet
                </button>
            </footer>
        </div>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
